services:
  mysql:
    image: mysql:8.0
    container_name: routine-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 12345
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: routine_db
      MYSQL_USER: routine_user
      MYSQL_PASSWORD: 12345
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql -h127.0.0.1 -uroutine_user -p12345 -e 'SELECT 1' routine_db >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
