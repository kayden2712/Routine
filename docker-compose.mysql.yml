version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: routine-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 12345
      MYSQL_DATABASE: routine_db
      MYSQL_USER: routine_user
      MYSQL_PASSWORD: Routine@2026!
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p12345"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
