# Application Configuration
spring.application.name=routine-backend

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain

# Request Timeout
spring.mvc.async.request-timeout=60000

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# Actuator Health Check
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/routine_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT Configuration (Use environment variable in production: JWT_SECRET)
jwt.secret=${JWT_SECRET:YourSuperSecretKeyForJWTTokenGenerationChangeThisInProduction123456789}
jwt.admin.expiration=86400000
jwt.customer.expiration=604800000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:5174

# Logging (Use DEBUG only in development)
logging.level.com.example.be=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO

# SpringDoc OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.display-request-duration=true

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
