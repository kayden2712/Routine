# ========================================
# Test Database Configuration
# ========================================
# Profile này dùng để run application trong test environment
# Sẽ kết nối đến database routine_test_db thay vì routine_db

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/routine_test_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=routine_user
spring.datasource.password=Routine@2026!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Enable test data reset on startup (see TestDataResetComponent)
app.test.reset-data.enabled=true
app.test.data.seed=true

# Logging
logging.level.root=WARN
logging.level.com.example.be=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
