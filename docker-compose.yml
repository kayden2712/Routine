version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: routine_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: routine_db
      MYSQL_USER: routine_user
      MYSQL_PASSWORD: routine_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend (Spring Boot)
  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: routine_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/routine_db?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: routine_user
      SPRING_DATASOURCE_PASSWORD: routine_password
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./be:/app

  # Frontend Admin
  admin:
    build:
      context: ./fe/admin
      dockerfile: Dockerfile
    container_name: routine_admin
    environment:
      VITE_API_URL: http://localhost:8080/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

  # Frontend Storefront
  storefront:
    build:
      context: ./fe/storefront
      dockerfile: Dockerfile
    container_name: routine_storefront
    environment:
      VITE_API_URL: http://localhost:8080/api
    ports:
      - "5174:5174"
    depends_on:
      - backend

volumes:
  mysql_data:
